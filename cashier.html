<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>POS</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="Assets/css/style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* ================= THEME ================= */
    :root {
      --brand-primary: #6366f1;
      --brand-secondary: var(--brand-primary);
      --bg-color: #f8fafc;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --panel-bg: rgba(255, 255, 255, 0.8);
      --border-color: rgba(226, 232, 240, 0.8);
      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1.25rem;
      --radius-xl: 2rem;
      --transition-fast: 0.2s ease;
      --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg-color: #0f172a;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --panel-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(51, 65, 85, 0.8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg-color);
      color: var(--text-primary);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: 'Outfit', 'Poppins', sans-serif;
    }


    /* ================= HEADER ================= */
    header {
      height: 70px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* THEME SWITCH */
    .theme-switch {
      cursor: pointer;
      font-size: 20px;
    }

    /* NETWORK */
    .net {
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
    }

    .net.online {
      background: #28a745
    }

    .net.offline {
      background: #dc3545
    }

    /* LOGOUT */
    .logout {
      background: #ff4d4d;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* ================= LAYOUT ================= */
    .container {
      display: flex;
      height: calc(100vh - 70px);
    }

    .left-panel {
      flex: 1.5;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .right-panel {
      width: 420px;
      background: var(--panel-bg);
      backdrop-filter: blur(25px);
      padding: 1.5rem;
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 30px rgba(0, 0, 0, 0.02);
    }

    /* ================= INPUT ================= */
    .barcode-input input {
      width: 100%;
      padding: 1.5rem;
      font-size: 1.25rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      background: var(--panel-bg);
      color: var(--text-primary);
      transition: all var(--transition-normal);
      outline: none;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
    }

    .barcode-input input:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.2);
      transform: translateY(-2px);
    }

    .customer-select {
      display: flex;
      align-items: center;
      gap: 25px;
      margin-bottom: 0.5rem;
    }

    .customer-select label {
      font-size: 0.75rem;
      line-height: 1.25;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      width: 60px;
      /* Force split to two lines */
      margin: 0;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .customer-dropdown {
      flex: 1;
      position: relative;
    }

    .customer-dropdown input {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      background: var(--panel-bg);
      color: var(--text-primary);
      outline: none;
      transition: all var(--transition-normal);
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
    }

    .customer-list {
      max-height: 500px;
      overflow-y: auto;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      margin-top: -2px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      display: none;
    }

    .customer-item {
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.03);
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      color: var(--text-primary);
    }

    .customer-item:hover {
      background: rgba(99, 102, 241, 0.08);
      color: var(--brand-primary);
      padding-left: 2rem;
    }

    /* ================= CART ================= */
    .cart-header {
      font-size: 1.3rem;
      font-weight: 700
    }

    .cart-items {
      flex: 1;
      overflow: auto;
      margin-top: 10px;
    }

    /* ===== CART HOVER EFFECT ===== */
    .cart-item {
      display: flex;
      flex-direction: column;
      padding: 1.25rem;
      background: var(--panel-bg);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
      transition: all var(--transition-normal);
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
    }

    .cart-item:hover {
      border-color: var(--brand-primary);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      /*transform: scale(1.01);*/
    }

    .item-total {
      font-weight: 700;
      color: var(--brand-primary);
      font-size: 1.125rem;
    }

    /* ===== ACTIONS ===== */
    .item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-controls {
      display: flex;
      gap: 6px;
    }

    .qty-controls button {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
    }

    .qty-input {
      width: 60px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-weight: 600;
      padding: 4px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
    }

    /* ===== DELETE BUTTON ===== */
    .delete-btn {
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      transform: scale(.8);
      transition: .2s;
      color: #ff4d4d;
    }

    /* show delete only on hover */
    .cart-item:hover .delete-btn {
      opacity: 1;
      transform: scale(1);
    }


    /* ================= TOTAL ================= */
    .cart-summary {
      margin-top: 15px;
      font-size: 18px;
    }

    .cart-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .cart-controls button {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    .cart-controls button:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] .cart-controls button:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .held-item {
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #total {
      font-size: 36px;
      font-weight: 800;
      color: var(--secondary);
    }

    /* ================= CHECKOUT ================= */
    .checkoutBtn {
      padding: 1.25rem;
      font-size: 1.25rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: #fff;
      cursor: pointer;
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
      transition: all var(--transition-normal);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .checkoutBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 35px -10px rgba(99, 102, 241, 0.5);
      filter: brightness(1.1);
    }

    /* ================= MODAL ================= */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--panel-bg);
      backdrop-filter: blur(30px);
      color: var(--text-primary);
      padding: 2.5rem;
      width: 450px;
      border-radius: var(--radius-xl);
      text-align: center;
      border: 1px solid var(--border-color);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .modal h2 {
      margin-bottom: 40px
    }

    .modal input {
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }

    .balance {
      font-weight: 700;
      font-size: 30px;
      margin: 35px;
    }

    .modalTotal {
      font-size: 20px
    }

    .payments {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .payments button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    .cash {
      background: #28a745
    }

    .card {
      background: var(--secondary)
    }

    .qr {
      background: var(--primary)
    }

    .discount-tag {
      background: rgba(255, 0, 0, .15);
      color: #ff4d4d;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 12px;
      margin-left: 6px;
    }

    /* ================= MISC ================= */
    .searching-customer .cart-header,
    .searching-customer .cart-items,
    .searching-customer .cart-summary,
    .searching-customer .cart-controls,
    .searching-customer .checkoutBtn {
      display: none !important;
    }

    .sale-flash {
      animation: flashGreen 0.5s ease-out;
    }

    @keyframes flashGreen {
      0% {
        background: rgba(16, 185, 129, 0.2);
      }

      100% {
        background: var(--panel-bg);
      }
    }

    /* ================= MOBILE OPTIMIZATION ================= */
    @media (max-width: 768px) {

      header {
        height: auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 14px 16px;
      }

      header h1 {
        font-size: 18px;
      }

      .top-right {
        width: 100%;
        justify-content: space-between;
      }

      .container {
        flex-direction: column;
        height: auto;
      }

      .left-panel,
      .right-panel {
        flex: none;
        width: 100%;
        padding: 16px;
      }

      .right-panel {
        box-shadow: none;
        border-top: 1px solid var(--border);
      }

      /* Inputs */
      .barcode-input input,
      .customer-dropdown input {
        font-size: 1rem;
        padding: 14px;
      }

      /* Cart */
      .cart-header {
        font-size: 1.1rem;
        margin-top: 12px;
      }

      .cart-items {
        max-height: 45vh;
      }

      .cart-item {
        padding: 12px;
      }

      .item-name {
        font-size: 15px;
      }

      .item-meta {
        font-size: 12px;
      }

      .item-total {
        font-size: 16px;
      }

      /* Buttons */
      .checkoutBtn {
        font-size: 18px;
        padding: 14px;
      }

      .qty-controls button {
        padding: 6px 12px;
        font-size: 16px;
      }

      .delete-btn {
        font-size: 20px;
      }

      /* MODALS */
      .modal-content {
        width: 92%;
        max-width: 400px;
        padding: 20px;
      }

      .modal h2 {
        margin-bottom: 20px;
        font-size: 20px;
      }

      .balance {
        font-size: 24px;
        margin: 20px;
      }

      .payments {
        flex-direction: column;
      }

      .payments button {
        font-size: 16px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div style="display: flex; align-items: center; gap: 1rem;">
      <button class="back-btn" onclick="window.location.href='dashboard.html'"
        style="display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); color: var(--text-primary); border: none;">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
        <span>Dashboard</span>
      </button>
      <div>
        <h1 id="bizName" style="font-family: 'Outfit'; margin: 0;">POS</h1>
        <div style="font-size:12px; opacity: 0.7;">Terminal: <b id="cashierName">Nethsara</b></div>
      </div>
    </div>

    <div class="top-right">
      <div id="netStatus" class="net online"
        style="display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 20px; font-size: 13px;">
        <span style="width: 8px; height: 8px; border-radius: 50%; background: #10b981;"></span>
        Online
      </div>
      <button class="theme-toggle" onclick="toggleTheme()"
        style="background: var(--bg-color); border: 1px solid var(--border-color); width: 36px; height: 36px; border-radius: 10px; cursor: pointer;">
        <i data-lucide="moon" style="width: 18px; height: 18px;"></i>
      </button>
      <button class="logout" onclick="logout()"
        style="display: flex; align-items: center; gap: 8px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 600; cursor: pointer;">
        <i data-lucide="log-out" style="width: 18px; height: 18px;"></i>
        Logout
      </button>
    </div>
  </header>

  <div class="container">
    <div class="left-panel">
      <!-- BARCODE INPUT -->
      <div class="barcode-input">
        <input id="barcodeInput" placeholder="Scan barcode..." autofocus>
      </div>
    </div>

    <div class="right-panel">
      <!-- CUSTOMER SEARCH DROPDOWN -->
      <div class="customer-select">
        <label>Select Customer</label>

        <div class="customer-dropdown">
          <input type="text" id="customerInput" placeholder="Type customer name..." autocomplete="off" />

          <div class="customer-list" id="customerList"></div>
        </div>
      </div>

      <div class="cart-header">Cart</div>
      <div class="cart-items" id="cartItems"></div>

      <div class="cart-summary">
        Total: Rs <span id="total">0</span>
      </div>

      <button class="checkoutBtn" onclick="openCheckout()">CHECKOUT</button>

      <div class="cart-controls">
        <button onclick="holdCart()">⏸ Hold Cart</button>
        <button onclick="showHeldCarts()">📂 Retrieve</button>
        <button onclick="confirmClearCart()"
          style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.1);">🧹
          Clear</button>
      </div>
    </div>
  </div>

  <!-- GLOBAL LOADING OVERLAY -->
  <div id="globalLoader"
    style="position: fixed; inset: 0; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s;">
    <div
      style="width: 50px; height: 50px; border: 4px solid var(--border-color); border-top-color: var(--brand-primary); border-radius: 50%; animation: spin 1s linear infinite;">
    </div>
    <div
      style="margin-top: 1.5rem; font-weight: 600; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; font-size: 11px;">
      Restoring Terminal Session</div>
  </div>

  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <!-- MODAL -->
  <div class="modal" id="checkoutModal">
    <div class="modal-content">
      <h2>Checkout</h2>
      <div class="modalTotal">Total: Rs <span id="modalTotal">0</span></div>

      <div id="customerBalanceInfo"
        style="margin: 10px 0; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 8px; display: none;">
        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px;">
          <span>Previous Balance:</span>
          <span id="prevBalanceText">Rs 0</span>
        </div>
        <div
          style="display: flex; justify-content: space-between; font-weight: 700; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 5px;">
          <span>Total Outstanding:</span>
          <span id="totalDueText">Rs 0</span>
        </div>
      </div>

      <input id="cashInput" type="number" placeholder="Enter amount paid..."
        style="font-size: 1.5rem; padding: 1.5rem; font-weight: 700; text-align: center;">
      <div id="settlementPreview"
        style="font-size: 14px; color: #10b981; font-weight: 700; margin-top: 10px; display: none; padding: 10px; background: rgba(16, 185, 129, 0.05); border-radius: 8px;">
      </div>
      <div class="balance" style="margin: 2rem 0; font-size: 1.25rem; font-weight: 500; opacity: 0.8;">
        <span id="balanceLabel">Change</span>: Rs <span id="balance"
          style="font-size: 2.5rem; font-weight: 800; color: var(--brand-primary); display: block; margin-top: 0.5rem;">0</span>
      </div>

      <div class="payments">
        <button class="cash" onclick="confirmCash()"
          style="display: flex; align-items: center; justify-content: center; gap: 8px;">
          <i data-lucide="banknote" style="width: 18px; height: 18px;"></i>
          Cash
        </button>
        <button class="card" onclick="confirmOther('Card')"
          style="display: flex; align-items: center; justify-content: center; gap: 8px;">
          <i data-lucide="credit-card" style="width: 18px; height: 18px;"></i>
          Card
        </button>
        <button class="qr" onclick="confirmOther('QR')"
          style="display: flex; align-items: center; justify-content: center; gap: 8px;">
          <i data-lucide="qr-code" style="width: 18px; height: 18px;"></i>
          QR
        </button>
        <button id="loanBtn" class="qr"
          style="background: #ff9800; display: none; align-items: center; justify-content: center; gap: 8px;"
          onclick="confirmLoan()">
          <i data-lucide="user-plus" style="width: 18px; height: 18px;"></i>
          Loan
        </button>
      </div>
    </div>
  </div>

  <!-- EDIT ITEM MODAL -->
  <div class="modal" id="editItemModal">
    <div class="modal-content">
      <h2>Edit Item</h2>

      <input id="editName" placeholder="Item name">
      <input id="editQty" type="number" step="any" placeholder="Quantity">
      <input id="editPrice" type="number" placeholder="Unit price">
      <input id="editDiscount" type="number" placeholder="Discount (Rs per item)">

      <div class="payments">
        <button class="cash" onclick="saveItemEdit()">Save</button>
        <button class="card" onclick="closeEdit()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- HELD CARTS MODAL -->
  <div class="modal" id="heldCartsModal">
    <div class="modal-content" style="max-width: 500px;">
      <h2>Held Carts</h2>
      <div id="heldCartsList" style="max-height: 300px; overflow-y: auto; text-align: left;">
        <!-- Items go here -->
      </div>
      <div class="payments">
        <button class="card" onclick="document.getElementById('heldCartsModal').style.display='none'">Close</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="Assets/js/firebase.js"></script>
  <script src="Assets/js/theme.js"></script>
  <script>
    function toggleTheme() {
      const raw = localStorage.getItem("BUSINESS_TRADEMARK");
      if (!raw) return;
      const t = JSON.parse(raw);
      t.mode = t.mode === "dark" ? "light" : "dark";
      localStorage.setItem("BUSINESS_TRADEMARK", JSON.stringify(t));
      applySharedTheme();
    }

    // Start theme immediately
    if (typeof applySharedTheme === 'function') applySharedTheme();

    window.firebaseReady.then(() => {
      loadCustomers();
      loadProducts();
      lucide.createIcons();

      monitorFirebasePing((online) => {
        const badge = document.getElementById("netStatus");
        if (badge) {
          badge.style.background = online ? "rgba(16, 185, 129, 0.1)" : "rgba(239, 68, 68, 0.1)";
          badge.style.color = online ? "#10b981" : "#ef4444";

    function removeItem(barcode) {

    function qty(barcode, d) {
      const i = cart.find(x => String(x.barcode) === String(barcode));
      if (!i) return;

      i.qty += d;

      // Allow 0 quantity ONLY IF it's a returnable container item (for Return Only transactions)
      const minQty = i.returnContainer ? 0 : 0.001;

      if (i.qty < minQty) {
        if (i.returnContainer && i.qty < 0) {
          // If goes below 0, remove
          cart = cart.filter(x => String(x.barcode) !== String(barcode));
        } else if (!i.returnContainer && i.qty <= 0) {
          // Standard items remove at 0
          cart = cart.filter(x => String(x.barcode) !== String(barcode));
        }
      }

      // Cleanup edge case float precision if needed, but simple check suffices for UI logic
      if (i.qty <= 0 && !i.returnContainer) {
        cart = cart.filter(x => String(x.barcode) !== String(barcode));
      }

      renderCart();
    }

    function updateItemQty(barcode, val) {
      const i = cart.find(x => String(x.barcode) === String(barcode));
      if (!i) return;

      let newQty = parseFloat(val);
      const minQty = i.returnContainer ? 0 : 0.001;

      if (isNaN(newQty) || newQty < minQty) {
        newQty = (i.returnContainer) ? 0 : 1;
      }

      i.qty = newQty;
      renderCart();
    }

    function updateItemReturnQty(barcode, val, isLive = false) {
      const i = cart.find(x => String(x.barcode) === String(barcode));
      if (!i) return;

      let ret = parseFloat(val);
      if (isNaN(ret) || ret < 0) ret = 0;

      i.returnQty = ret;

      // Real-time UI update for "Owed" display
      const initialAssets = Number(selectedCustomer?.assets || 0);
      const owedVal = initialAssets - ret;

      // Update the specific item's owed display if it exists
      // Note: We use oninput for "live" feel, but renderCart only on final change to keep performance
      // Actually, since we don't want to lose focus, we manually update the span.
      const itemRows = document.querySelectorAll('.cart-item');
      itemRows.forEach(row => {
        // This is slightly complex because of multiple items. 
        // Let's just find the span within the current row context if possible, 
        // or just update all spans that belong to this barcode.
        // For simplicity, find all spans with the class and update them.
        // Note: If customer has multiple returnable items, the 'Owed' usually refers 
        // to their total balance. So we should subtract ALL returnQtys?
        // The user said "when return changes, owned should decrease".
        // If they return 1 bottle from Item A, the total owed decreases by 1.

        let totalReturnInCart = 0;
        cart.forEach(item => { if (item.returnContainer) totalReturnInCart += (item.returnQty || 0); });

        const globalOwed = initialAssets - totalReturnInCart;
        document.querySelectorAll('.owed-balance-val').forEach(span => {
          span.innerText = globalOwed;
        });
      });

      if (!isLive) renderCart();
    }

    function buildReceiptJSON(paymentType) {
      const business = JSON.parse(localStorage.getItem("BUSINESS_INFO") || "{}");
      const cashierName = document.getElementById("cashierName").innerText;
      const customerId = selectedCustomer ? selectedCustomer.id : null;

      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const timestamp = Date.now();
      const billId = "BILL_" + timestamp + cashierName;     // offline-safe unique ID
      const billNo = "";

      let total = 0;
      let totalDiscount = 0;

      const items = cart.map(item => {
        const unitDiscount = Number(item.mrp || 0) - Number(item.rp || 0);
        const lineDiscount = unitDiscount * item.qty;
        const subtotal = Number(item.rp || 0) * item.qty;

        total += subtotal;
        totalDiscount += lineDiscount;

        return {
          itemId: String(item.barcode),     // reference only
          barcode: item.barcode || "",
          name: item.name,
          unitPrice: Number(item.mrp),
          quantity: item.qty,
          discount: lineDiscount,
          subtotal: subtotal
        };
      });

      const rawPaid = (paymentType === "Cash" || paymentType === "Loan") ? Number(cashInput.value || 0) : total;

      // NET ASSET CHANGE CALCULATION
      let netAssetChange = 0;
      items.forEach(item => {
        const p = cart.find(c => String(c.barcode) === item.itemId);
        if (p && p.returnContainer) {
          netAssetChange += (Number(p.qty) - Number(p.returnQty || 0));
        }
      });

      // SMART SETTLEMENT LOGIC
      let change = 0;
      let loanUpdate = 0;
      const isReg = selectedCustomer && selectedCustomer.id && selectedCustomer.name !== "Walk-in Customer";

      if (rawPaid > total) {
        if (isReg) {
          const debt = Number(selectedCustomer.balance) || 0;
          const settlement = Math.min(rawPaid - total, debt);
          change = (rawPaid - total) - settlement;
          loanUpdate = -settlement;
        } else {
          change = rawPaid - total;
          loanUpdate = 0;
        }
      } else {
        change = 0;
        loanUpdate = total - rawPaid;
      }

      return {
        billId: billId,
        billNo: billNo,

        storeName: business.businessName,
        storeId: business.businessId || "STORE_001",
        cashierId: business.cashierId || cashierName,
        cashier: cashierName,
        customerId: customerId,

        date: `${yyyy}-${mm}-${dd}`,
        timestamp: timestamp,

        items: items,

        totalDiscount: totalDiscount,
        total: total,

        paymentMethod: paymentType,
        paidAmount: rawPaid,
        balance: change,
        loanUpdate: loanUpdate, // specific field for balance adjustment

        syncStatus: 0, // offline by default
        netAssetChange: netAssetChange // Track container debt change
      };
    }


    async function finishSale(type) {
      const receiptData = buildReceiptJSON(type);

      // Send JSON to C#
      window.chrome.webview.postMessage({
        type: "#PRINT_RECEIPT",
        receipt: receiptData
      });

      // Handle Loan / Balance Update
      if (receiptData.customerId) {
        if (receiptData.loanUpdate !== 0) {
          console.log("💸 Triggering Loan Update:", receiptData.loanUpdate);
          await updateLocalCustomerBalance(receiptData.customerId, receiptData.loanUpdate);
        }
        // Handle Asset Update
        if (receiptData.netAssetChange !== 0) {
          console.log("♻️ Triggering Asset Update:", receiptData.netAssetChange);
          await updateLocalCustomerAssets(receiptData.customerId, receiptData.netAssetChange);
          updateCustomerAssetsOnline(receiptData.customerId, receiptData.netAssetChange);
        }
      }

      // Clear cart and UI
      cart = [];
      renderCart();
      modal.style.display = "none";
      console.log("🛒 Cart cleared & Modal closed");

      // Reset customer
      selectedCustomer = { id: null, name: "Walk-in Customer", balance: 0 };
      if (document.getElementById("customerInput")) {
        document.getElementById("customerInput").value = "Walk-in Customer";
      }

      barcodeInput.focus();

      // Refresh customers to show new balance in search list
      loadCustomers();

      saveOnlineBill(JSON.parse(localStorage.getItem("BUSINESS_INFO") || "{}").businessID, receiptData);
      reduceLocalStock(receiptData.items);
    }

    async function updateLocalCustomerBalance(id, amount) {
      try {
        const db = await openDB();
        const tx = db.transaction(window.STORES.CUSTOMERS, "readwrite");
        const store = tx.objectStore(window.STORES.CUSTOMERS);

        return new Promise((resolve, reject) => {
          const req = store.get(id);
          req.onsuccess = () => {
            const customer = req.result;
            if (customer) {
              customer.balance = (Number(customer.balance) || 0) + Number(amount);
              store.put(customer);

              // Update global customers array for immediate UI reflection
              const c = customers.find(x => String(x.id) === String(id));
              if (c) c.balance = customer.balance;

              console.log("💰 Local balance updated for customer:", id, "New Balance:", customer.balance);
            }
            resolve();
          };
          req.onerror = () => reject(req.error);
        });
      } catch (err) {
        console.error("Failed to update local customer balance:", err);
      }
    }

    async function updateLocalCustomerAssets(id, amount) {
      try {
        const db = await openDB();
        const tx = db.transaction(window.STORES.CUSTOMERS, "readwrite");
        const store = tx.objectStore(window.STORES.CUSTOMERS);

        return new Promise((resolve, reject) => {
          const req = store.get(id);
          req.onsuccess = () => {
            const customer = req.result;
            if (customer) {
              customer.assets = (Number(customer.assets) || 0) + Number(amount);
              store.put(customer);

              // Update global customers array
              const c = customers.find(x => String(x.id) === String(id));
              if (c) c.assets = customer.assets;

              console.log("♻️ Local assets updated for customer:", id, "New Assets:", customer.assets);
            }
            resolve();
          };
          req.onerror = () => reject(req.error);
        });
      } catch (err) {
        console.error("Failed to update local customer assets:", err);
      }
    }

    async function reduceLocalStock(items) {
      try {
        // 1. Update IndexedDB
        const db = await openDB();
        const tx = db.transaction(window.STORES.PRODUCTS, "readwrite");
        const store = tx.objectStore(window.STORES.PRODUCTS);
        for (const item of items) {
          const req = store.get(item.barcode);
          req.onsuccess = () => {
            const p = req.result;
            if (p) {
              p.stock = (p.stock || 0) - item.quantity;
              store.put(p);
            }
          };
        }

        // 2. Update localStorage (PRODUCT_DATA)
        const stored = JSON.parse(localStorage.getItem("PRODUCT_DATA") || "[]");
        items.forEach(item => {
          const p = stored.find(x => x.barcode === item.barcode);
          if (p) {
            p.stock = (p.stock || 0) - item.quantity;
          }
        });
        localStorage.setItem("PRODUCT_DATA", JSON.stringify(stored));

        // 3. Update global products variable
        products = stored;

        console.log("📉 Local stock reduced");
      } catch (err) {
        console.error("Failed to reduce local stock:", err);
      }
    }

              <div style="font-size:12px; opacity:0.7">${h.timestamp} • ${h.cart.length} Items</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700">Rs ${h.total}</div>
              <button onclick="retrieveCart(${h.id})" style="font-size:12px; padding:4px 8px; margin-top:4px; background:var(--primary); color:#fff; border:none; border-radius:4px; cursor:pointer;">Retrieve</button>
            </div>
          `;
          list.appendChild(div);
        });
      }

      modal.style.display = "flex";
    }

    function retrieveCart(id) {
      let heldCarts = JSON.parse(localStorage.getItem("HELD_CARTS") || "[]");
      const target = heldCarts.find(h => h.id === id);

      if (!target) return;

      if (cart.length > 0) {
        if (!confirm("Current cart will be cleared. Continue?")) return;
      }

      // Restore
      cart = target.cart;
      selectedCustomer = target.customer || { id: null, name: "Walk-in Customer", balance: 0 };
      document.getElementById("customerInput").value = selectedCustomer.name;

      renderCart();

      // Remove from held
      heldCarts = heldCarts.filter(h => h.id !== id);
      localStorage.setItem("HELD_CARTS", JSON.stringify(heldCarts));

      document.getElementById("heldCartsModal").style.display = "none";
    }

    // Close modal on outside click
    document.getElementById("heldCartsModal").addEventListener("click", e => {
      if (e.target.className === "modal") {
        document.getElementById("heldCartsModal").style.display = "none";
      }
    });

    function saveItemEdit() {
      const item = cart.find(
        x => String(x.barcode) === String(editingItemId)
      );
      if (!item) return;

      const newQty = Number(document.getElementById("editQty").value);
      const newMrp = Number(document.getElementById("editPrice").value);
      const discount = Number(document.getElementById("editDiscount").value) || 0;

      item.name = document.getElementById("editName").value.trim();
      item.qty = newQty > 0 ? newQty : 1;
      item.mrp = newMrp;
      item.rp = newMrp - discount;

      closeEdit();
      renderCart();
    }


    document.getElementById("editItemModal").addEventListener("click", e => {
      if (e.target.classList.contains("modal")) closeEdit();
    });

    document.getElementById("bizName").addEventListener("click", e => {
      window.location.href = "dashboard.html";
    });

    document
      .querySelector("#editItemModal .modal-content")
      .addEventListener("click", e => e.stopPropagation());


    function logout() {
      window.location.href = "index.html";
    }

    function confirmClearCart() {
      if (cart.length === 0) return;
      if (confirm("Are you sure you want to clear the current cart? This cannot be undone.")) {
        cart = [];
        updateCart();
        alert("Cart cleared.");
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      // Hide loader after a brief stabilization
      setTimeout(() => {
        const loader = document.getElementById("globalLoader");
        if (loader) {
          loader.style.opacity = "0";
          loader.style.visibility = "hidden";
          setTimeout(() => loader.remove(), 500);
        }
      }, 1000);
    });

  </script>

</body>

</html>
