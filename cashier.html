<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>POS</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ================= THEME ================= */
    :root {
      --primary: #519cff;
      --secondary: #904bb8;

      --bg: #f5f6fa;
      --panel: #ffffff;
      --text: #111;
      --border: #e5e7eb;
    }

    [data-theme="dark"] {
      --bg: #0f1115;
      --panel: #1a1d24;
      --text: #f1f1f1;
      --border: #2a2d36;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }


    /* ================= HEADER ================= */
    header {
      height: 70px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 25px;
    }

    header h1 {
      font-size: 22px
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* THEME SWITCH */
    .theme-switch {
      cursor: pointer;
      font-size: 20px;
    }

    /* NETWORK */
    .net {
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
    }

    .net.online {
      background: #28a745
    }

    .net.offline {
      background: #dc3545
    }

    /* LOGOUT */
    .logout {
      background: #ff4d4d;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* ================= LAYOUT ================= */
    .container {
      display: flex;
      height: calc(100vh - 70px);
    }

    .left-panel {
      flex: 3;
      padding: 25px
    }

    .right-panel {
      flex: 2;
      background: var(--panel);
      padding: 25px;
      box-shadow: -4px 0 12px rgba(0, 0, 0, .15);
      display: flex;
      flex-direction: column;
    }

    /* ================= INPUT ================= */
    .barcode-input input {
      width: 100%;
      padding: 16px;
      font-size: 1.2rem;
      border-radius: 12px;
      border: 2px solid var(--primary);
      background: var(--panel);
      color: var(--text);
    }

    .customer-dropdown {
      position: relative;
    }

    .customer-dropdown input {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }

    .customer-list {
      position: absolute;
      top: 110%;
      left: 0;
      right: 0;
      max-height: 220px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: auto;
      display: none;
      z-index: 50;
    }

    .customer-item {
      padding: 12px 14px;
      cursor: pointer;
      transition: background .2s;
    }

    .customer-item:hover {
      background: linear-gradient(135deg,
          color-mix(in srgb, var(--primary) 12%, transparent),
          color-mix(in srgb, var(--secondary) 12%, transparent));
    }

    /* ================= CART ================= */
    .cart-header {
      font-size: 1.3rem;
      font-weight: 700
    }

    .cart-items {
      flex: 1;
      overflow: auto;
      margin-top: 10px;
    }

    /* ===== CART HOVER EFFECT ===== */
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background .2s, box-shadow .2s;
      cursor: pointer;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .cart-item:hover {
      background: linear-gradient(135deg,
          color-mix(in srgb, var(--primary) 12%, transparent),
          color-mix(in srgb, var(--secondary) 12%, transparent));
      box-shadow: 0 6px 16px rgba(0, 0, 0, .15);
    }

    /* ===== ITEM TEXT ===== */
    .item-info {
      display: flex;
      flex-direction: column;
    }

    .item-name {
      font-weight: 600;
    }

    .item-meta {
      font-size: 13px;
      opacity: .75;
    }

    /* ===== RIGHT SIDE ===== */
    .item-right {
      text-align: right;
    }

    .item-total {
      font-weight: 800;
      color: var(--secondary);
      margin-bottom: 4px;
    }

    /* ===== ACTIONS ===== */
    .item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-controls {
      display: flex;
      gap: 6px;
    }

    .qty-controls button {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 700;
    }

    /* ===== DELETE BUTTON ===== */
    .delete-btn {
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      transform: scale(.8);
      transition: .2s;
      color: #ff4d4d;
    }

    /* show delete only on hover */
    .cart-item:hover .delete-btn {
      opacity: 1;
      transform: scale(1);
    }


    /* ================= TOTAL ================= */
    .cart-summary {
      margin-top: 15px;
      font-size: 18px;
    }

    .cart-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .cart-controls button {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    .cart-controls button:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] .cart-controls button:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .held-item {
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #total {
      font-size: 36px;
      font-weight: 800;
      color: var(--secondary);
    }

    /* ================= CHECKOUT ================= */
    .checkoutBtn {
      margin-top: 15px;
      padding: 16px;
      font-size: 20px;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      cursor: pointer;
    }

    /* ================= MODAL ================= */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--panel);
      color: var(--text);
      padding: 25px;
      width: 400px;
      border-radius: 12px;
      text-align: center;
    }

    .modal h2 {
      margin-bottom: 40px
    }

    .modal input {
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }

    .balance {
      font-weight: 700;
      font-size: 30px;
      margin: 35px;
    }

    .modalTotal {
      font-size: 20px
    }

    .payments {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .payments button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    .cash {
      background: #28a745
    }

    .card {
      background: var(--secondary)
    }

    .qr {
      background: var(--primary)
    }

    .discount-tag {
      background: rgba(255, 0, 0, .15);
      color: #ff4d4d;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 12px;
      margin-left: 6px;
    }

    /* ================= MOBILE OPTIMIZATION ================= */
    @media (max-width: 768px) {

      header {
        height: auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 14px 16px;
      }

      header h1 {
        font-size: 18px;
      }

      .top-right {
        width: 100%;
        justify-content: space-between;
      }

      .container {
        flex-direction: column;
        height: auto;
      }

      .left-panel,
      .right-panel {
        flex: none;
        width: 100%;
        padding: 16px;
      }

      .right-panel {
        box-shadow: none;
        border-top: 1px solid var(--border);
      }

      /* Inputs */
      .barcode-input input,
      .customer-dropdown input {
        font-size: 1rem;
        padding: 14px;
      }

      /* Cart */
      .cart-header {
        font-size: 1.1rem;
        margin-top: 12px;
      }

      .cart-items {
        max-height: 45vh;
      }

      .cart-item {
        padding: 12px;
      }

      .item-name {
        font-size: 15px;
      }

      .item-meta {
        font-size: 12px;
      }

      .item-total {
        font-size: 16px;
      }

      /* Buttons */
      .checkoutBtn {
        font-size: 18px;
        padding: 14px;
      }

      .qty-controls button {
        padding: 6px 12px;
        font-size: 16px;
      }

      .delete-btn {
        font-size: 20px;
      }

      /* MODALS */
      .modal-content {
        width: 92%;
        max-width: 400px;
        padding: 20px;
      }

      .modal h2 {
        margin-bottom: 20px;
        font-size: 20px;
      }

      .balance {
        font-size: 24px;
        margin: 20px;
      }

      .payments {
        flex-direction: column;
      }

      .payments button {
        font-size: 16px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div>
      <h1 id="bizName">POS</h1>
      <div style="font-size:14px;">Cashier: <b id="cashierName">Nethsara</b></div>
    </div>

    <div class="top-right">
      <button class="back-btn" onclick="window.location.href='dashboard.html'">Back</button>
      <div id="netStatus" class="net online">● Online</div>
      <div class="theme-switch" onclick="toggleTheme()">🌓</div>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <div class="left-panel">
      <!-- BARCODE INPUT -->
      <div class="barcode-input">
        <input id="barcodeInput" placeholder="Scan barcode..." autofocus>
      </div>
    </div>

    <div class="right-panel">
      <!-- CUSTOMER SEARCH DROPDOWN -->
      <div class="customer-select">
        <label>Select Customer</label>

        <div class="customer-dropdown">
          <input type="text" id="customerInput" placeholder="Type customer name..." autocomplete="off" />

          <div class="customer-list" id="customerList"></div>
        </div>
      </div>

      <div class="cart-header">Cart</div>
      <div class="cart-items" id="cartItems"></div>

      <div class="cart-summary">
        Total: Rs <span id="total">0</span>
      </div>

      <div class="cart-controls">
        <button onclick="holdCart()">⏸ Hold Cart</button>
        <button onclick="showHeldCarts()">📂 Retrieve</button>
      </div>

      <button class="checkoutBtn" onclick="openCheckout()">CHECKOUT</button>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="checkoutModal">
    <div class="modal-content">
      <h2>Checkout</h2>
      <div class="modalTotal">Total: Rs <span id="modalTotal">0</span></div>

      <input id="cashInput" type="number" placeholder="Cash received">
      <div class="balance">Balance: Rs <span id="balance">0</span></div>

      <div class="payments">
        <button class="cash" onclick="confirmCash()">Cash</button>
        <button class="card" onclick="confirmOther('Card')">Card</button>
        <button class="qr" onclick="confirmOther('QR')">QR</button>
      </div>
    </div>
  </div>

  <!-- EDIT ITEM MODAL -->
  <div class="modal" id="editItemModal">
    <div class="modal-content">
      <h2>Edit Item</h2>

      <input id="editName" placeholder="Item name">
      <input id="editPrice" type="number" placeholder="Unit price">
      <input id="editDiscount" type="number" placeholder="Discount (Rs per item)">

      <div class="payments">
        <button class="cash" onclick="saveItemEdit()">Save</button>
        <button class="card" onclick="closeEdit()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- HELD CARTS MODAL -->
  <div class="modal" id="heldCartsModal">
    <div class="modal-content" style="max-width: 500px;">
      <h2>Held Carts</h2>
      <div id="heldCartsList" style="max-height: 300px; overflow-y: auto; text-align: left;">
        <!-- Items go here -->
      </div>
      <div class="payments">
        <button class="card" onclick="document.getElementById('heldCartsModal').style.display='none'">Close</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="Assets/js/firebase.js"></script>
  <script src="Assets/js/theme.js"></script>
  <script>
    function toggleTheme() {
      const raw = localStorage.getItem("BUSINESS_TRADEMARK");
      if (!raw) return;
      const t = JSON.parse(raw);
      t.mode = t.mode === "dark" ? "light" : "dark";
      localStorage.setItem("BUSINESS_TRADEMARK", JSON.stringify(t));
      applySharedTheme();
    }

    window.firebaseReady.then(() => {
      applySharedTheme();
      loadCustomers();
      loadProducts();

      monitorFirebasePing((online) => {
        console.log("Firebase reachable?", online);
        const badge = document.getElementById("netStatus");
        if (badge) {
          badge.className = online ? "net online" : "net offline";
          badge.innerText = online ? "● Online" : "● Offline";
        }
      });
    });

    let products = [];
    let cart = [];
    let customers = [];

    async function loadCustomers() {
      // 1️⃣ Try online sync (Firebase → IndexedDB)
      await loadCustomersOnline(); // safe even if offline

      // 2️⃣ Clear array
      customers = [];

      // 3️⃣ Add walk-in customer FIRST
      customers.push({
        id: null,
        name: "Walk-in Customer",
        balance: 0
      });

      // 4️⃣ Read from IndexedDB ✅
      const stored = await getAll(STORES.CUSTOMERS);

      customers.push(...stored);

      // Pre-fill walk-in
      customerInput.value = "Walk-in Customer";
    }

    function renderCustomerDropdown() {
      // This function is redundant now that we use the searchable list, 
      // but keeping it empty to avoid breakages if called elsewhere.
    }

    let selectedCustomer = { id: null, name: "Walk-in Customer", balance: 0 };

    const customerInput = document.getElementById("customerInput");
    const customerList = document.getElementById("customerList");

    function renderCustomerList(filter = "") {
      customerList.innerHTML = "";
      const filtered = customers.filter(c =>
        c.name.toLowerCase().includes(filter.toLowerCase())
      );

      if (!filtered.length) {
        customerList.innerHTML = `<div class="customer-item">No customers found</div>`;
        customerList.style.display = "block";
        return;
      }

      filtered.forEach(c => {
        const div = document.createElement("div");
        div.className = "customer-item";
        div.innerText = c.name + (c.balance ? ` (Rs ${c.balance})` : "");
        div.onclick = () => {
          selectedCustomer = c;
          customerInput.value = c.name;
          customerList.style.display = "none";
          barcodeInput.focus();
        };
        customerList.appendChild(div);
      });
      customerList.style.display = "block";
    }

    // Typing filters
    customerInput.addEventListener("input", e => {
      renderCustomerList(e.target.value);
    });

    // Focus opens list
    customerInput.addEventListener("focus", () => {
      renderCustomerList(customerInput.value);
    });

    // Click outside closes
    document.addEventListener("click", e => {
      if (!e.target.closest(".customer-dropdown")) {
        customerList.style.display = "none";
      }
    });

    /* ================= YOUR POS LOGIC (UNCHANGED) ================= */
    async function loadProducts() {
      await loadProductsOnline();
      const stored = JSON.parse(localStorage.getItem("PRODUCT_DATA") || "[]");
      products = stored;
    }

    const barcodeInput = document.getElementById("barcodeInput");
    const cartItems = document.getElementById("cartItems");
    const totalEl = document.getElementById("total");
    const modal = document.getElementById("checkoutModal");
    const modalTotal = document.getElementById("modalTotal");
    const cashInput = document.getElementById("cashInput");
    const balanceEl = document.getElementById("balance");
    // Initial load called via firebaseReady above

    barcodeInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const code = barcodeInput.value.trim();
        barcodeInput.value = "";
        if (code === "") { openCheckout(); return; }
        const p = products.find(x => x.barcode === code);
        if (!p) { alert("Product not found"); return; }
        addToCart(p);
      }
    });

    function addToCart(p) {
      const i = cart.find(x => x.barcode === p.barcode);
      if (i) i.qty++; else cart.push({ ...p, qty: 1 });
      renderCart();
    }

    function renderCart() {
      let cartHtml = "";
      let total = 0;

      cart.forEach(i => {
        const discount = i.mrp - i.rp || 0;
        const subtotal = i.rp * i.qty;
        total += subtotal;

        cartHtml += `
          <div class="cart-item" onclick="openEditItem('${i.barcode}')">
            <div class="item-info">
              <div class="item-name">${i.name}</div>
              <div class="item-meta">
                Rs ${i.mrp} × ${i.qty}
                ${discount !== 0 ? `<span class="discount-tag">−Rs ${discount}</span>` : ""}
              </div>
            </div>

            <div class="item-right">
              <div class="item-total">
                Rs ${subtotal.toLocaleString()}
              </div>

              <div class="item-actions" onclick="event.stopPropagation()">
                <div class="qty-controls">
                  <button onclick="event.stopPropagation(); qty('${i.barcode}',-1)">−</button>
                  <button onclick="event.stopPropagation(); qty('${i.barcode}',1)">+</button>
                </div>

                <button class="delete-btn" onclick="event.stopPropagation(); removeItem('${i.barcode}')">🗑</button>
              </div>
            </div>
          </div>`;
      });

      cartItems.innerHTML = cartHtml;
      totalEl.innerText = total.toLocaleString();
    }

    function removeItem(barcode) {
      cart = cart.filter(x => String(x.barcode) !== String(barcode));
      renderCart();
    }


    function qty(barcode, d) {
      const i = cart.find(x => String(x.barcode) === String(barcode));
      if (!i) return;

      i.qty += d;

      if (i.qty <= 0) {
        cart = cart.filter(x => String(x.barcode) !== String(barcode));
      }

      renderCart();
    }


    function openCheckout() {
      if (!cart.length) { alert("Cart is empty"); return; }
      modal.style.display = "flex";
      modalTotal.innerText = totalEl.innerText;
      cashInput.value = "";
      balanceEl.innerText = "0";
      cashInput.focus();
    }

    cashInput.addEventListener("input", () => {
      const b = cashInput.value - modalTotal.innerText;
      balanceEl.innerText = b >= 0 ? b : 0;
    });

    function confirmCash() {
      if (+cashInput.value < +modalTotal.innerText) { alert("Insufficient cash"); return; }
      finishSale("Cash");
    }

    function buildReceiptJSON(paymentType) {
      const business = JSON.parse(localStorage.getItem("BUSINESS_INFO") || "{}");
      const cashierName = document.getElementById("cashierName").innerText;
      const selectedCustomerId = document.getElementById("customerInput").value;

      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const timestamp = Date.now();
      const billId = "BILL_" + timestamp + cashierName;     // offline-safe unique ID
      const billNo = "";

      let total = 0;
      let totalDiscount = 0;

      const items = cart.map(item => {
        const discount = item.mrp - item.rp || 0;
        const subtotal = (item.mrp * item.qty) - discount;

        total += subtotal;
        totalDiscount += discount;

        return {
          itemId: String(item.barcode),     // reference only
          barcode: item.barcode || "",
          name: item.name,
          unitPrice: Number(item.mrp),
          quantity: item.qty,
          discount: item.mrp - item.rp,
          subtotal: subtotal
        };
      });

      const paidAmount =
        paymentType === "Cash"
          ? Number(cashInput.value)
          : total;

      const balance =
        paymentType === "Cash"
          ? paidAmount - total
          : 0;

      return {
        billId: billId,
        billNo: billNo,

        storeName: business.businessName,
        storeId: business.businessId || "STORE_001",
        cashierId: business.cashierId || cashierName,
        cashier: cashierName,
        customerId: selectedCustomerId || null,

        date: `${yyyy}-${mm}-${dd}`,
        timestamp: timestamp,

        items: items,

        totalDiscount: totalDiscount,
        total: total,

        paymentMethod: paymentType,
        paidAmount: paidAmount,
        balance: balance,

        syncStatus: 0 // offline by default
      };
    }


    function finishSale(type) {
      const receiptData = buildReceiptJSON(type);

      // Send JSON to C#
      window.chrome.webview.postMessage({
        type: "#PRINT_RECEIPT",
        receipt: receiptData
      });

      // Clear cart and UI
      cart = [];
      renderCart();
      modal.style.display = "none";
      barcodeInput.focus();
      /*
          // saving a bill copy in localStorage
          let unsyncedBills = JSON.parse(
          localStorage.getItem("UNSYNC_BILL") || "[]"
          );
      
          if (!unsyncedBills.includes(receiptData.billId)) {
              unsyncedBills.push(receiptData.billId);
          }
      
          localStorage.setItem(
              "UNSYNC_BILL",
              JSON.stringify(unsyncedBills)
          );
      */
      saveOnlineBill(JSON.parse(localStorage.getItem("BUSINESS_INFO") || "{}").businessID, receiptData);
    }

    let editingItemId = null;

    function openEditItem(barcode) {
      const item = cart.find(x => String(x.barcode) === String(barcode));
      if (!item) return;

      editingItemId = String(barcode);

      document.getElementById("editName").value = item.name;
      document.getElementById("editPrice").value = item.mrp;
      document.getElementById("editDiscount").value = item.mrp - item.rp || 0;

      document.getElementById("editItemModal").style.display = "flex";
    }

    function closeEdit() {
      document.getElementById("editItemModal").style.display = "none";
    }

    /* ================= HOLD CART LOGIC ================= */
    function holdCart() {
      if (cart.length === 0) {
        alert("Cart is empty!");
        return;
      }

      const heldCarts = JSON.parse(localStorage.getItem("HELD_CARTS") || "[]");
      const timestamp = new Date().toLocaleString();

      const holdData = {
        id: Date.now(),
        timestamp: timestamp,
        customer: selectedCustomer,
        cart: cart,
        total: document.getElementById("total").innerText
      };

      heldCarts.push(holdData);
      localStorage.setItem("HELD_CARTS", JSON.stringify(heldCarts));

      // Clear current cart
      cart = [];
      // Reset customer
      selectedCustomer = { id: null, name: "Walk-in Customer", balance: 0 };
      document.getElementById("customerInput").value = "Walk-in Customer";
      renderCart();

      // Notify
      alert("Cart held successfully! You can retrieve it later.");
    }

    function showHeldCarts() {
      const heldCarts = JSON.parse(localStorage.getItem("HELD_CARTS") || "[]");
      const list = document.getElementById("heldCartsList");
      const modal = document.getElementById("heldCartsModal");

      list.innerHTML = "";

      if (heldCarts.length === 0) {
        list.innerHTML = "<p style='text-align:center; opacity:0.6'>No held carts found.</p>";
      } else {
        heldCarts.forEach((h, index) => {
          const div = document.createElement("div");
          div.className = "held-item";
          div.innerHTML = `
            <div>
              <div style="font-weight:600">${h.customer.name}</div>
              <div style="font-size:12px; opacity:0.7">${h.timestamp} • ${h.cart.length} Items</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700">Rs ${h.total}</div>
              <button onclick="retrieveCart(${h.id})" style="font-size:12px; padding:4px 8px; margin-top:4px; background:var(--primary); color:#fff; border:none; border-radius:4px; cursor:pointer;">Retrieve</button>
            </div>
          `;
          list.appendChild(div);
        });
      }

      modal.style.display = "flex";
    }

    function retrieveCart(id) {
      let heldCarts = JSON.parse(localStorage.getItem("HELD_CARTS") || "[]");
      const target = heldCarts.find(h => h.id === id);

      if (!target) return;

      if (cart.length > 0) {
        if (!confirm("Current cart will be cleared. Continue?")) return;
      }

      // Restore
      cart = target.cart;
      selectedCustomer = target.customer || { id: null, name: "Walk-in Customer", balance: 0 };
      document.getElementById("customerInput").value = selectedCustomer.name;

      renderCart();

      // Remove from held
      heldCarts = heldCarts.filter(h => h.id !== id);
      localStorage.setItem("HELD_CARTS", JSON.stringify(heldCarts));

      document.getElementById("heldCartsModal").style.display = "none";
    }

    // Close modal on outside click
    document.getElementById("heldCartsModal").addEventListener("click", e => {
      if (e.target.className === "modal") {
        document.getElementById("heldCartsModal").style.display = "none";
      }
    });

    function saveItemEdit() {
      const item = cart.find(
        x => String(x.barcode) === String(editingItemId)
      );
      if (!item) return;

      const newMrp = Number(document.getElementById("editPrice").value);
      const discount = Number(document.getElementById("editDiscount").value) || 0;

      item.name = document.getElementById("editName").value.trim();
      item.mrp = newMrp;
      item.rp = newMrp - discount;

      closeEdit();
      renderCart();
    }


    document.getElementById("editItemModal").addEventListener("click", e => {
      if (e.target.classList.contains("modal")) closeEdit();
    });

    document.getElementById("bizName").addEventListener("click", e => {
      window.location.href = "dashboard.html";
    });

    document
      .querySelector("#editItemModal .modal-content")
      .addEventListener("click", e => e.stopPropagation());


    function logout() {
      window.location.href = "index.html";
    }

  </script>

</body>

</html>
