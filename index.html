<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creatives POS | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Assets/css/style.css">

    <style>
        :root {
            /* Design Tokens */
            --bg-deep: #020617;
            --accent-primary: #6366f1;
            --accent-secondary: var(--accent-primary);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            
            /* Dynamic tokens for business customization */
            --biz-c1: var(--accent-primary);
            --biz-c2: var(--accent-secondary);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 🌌 Immersive Moving Background */
        .background-portal {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        #bgLayer1, #bgLayer2 {
            position: absolute;
            inset: 0;
            background-size: 200% 200%;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #bgLayer1 {
            background: 
                radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15), transparent 40%),
                var(--bg-deep);
            opacity: 1;
            animation: bgShift 20s infinite alternate linear;
        }

        #bgLayer2 {
            opacity: 0;
        }

        @keyframes bgShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* ✨ Subtle Grain Overlay */
        .background-portal::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* 🏟️ Main Stage Container */
        .main-stage {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 🏰 Branding Section */
        .branding {
            margin-bottom: 3.5rem;
            position: relative;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .primary-logo {
            width: 180px;
            filter: drop-shadow(0 0 25px rgba(99, 102, 241, 0.2));
            animation: breathe 4s ease-in-out infinite;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .business-logo {
            position: absolute;
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border: 1px solid var(--glass-border);
            opacity: 0;
            transform: scale(0.6) rotate(-10deg);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 35px var(--biz-c1));
        }

        .branding.customized .primary-logo {
            opacity: 0;
            transform: translateY(-20px) scale(0.8);
            filter: blur(10px);
        }

        .branding.customized .business-logo {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.15)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.4)); }
        }

        /* 🎫 Morphing Auth Card */
        .auth-card {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            padding: 2.5rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .auth-step {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
            transition: all 0.6s ease;
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ⌨️ Modern Inputs */
        .input-group {
            position: relative;
            width: 100%;
        }

        .modern-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 1.2rem 1.5rem;
            color: #fff;
            font-size: 1.05rem;
            font-family: inherit;
            transition: all 0.3s ease;
            text-align: center;
        }

        .modern-input:focus {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--biz-c1);
            box-shadow: 0 0 20px -5px var(--biz-c1);
            transform: translateY(-2px);
        }

        .modern-input::placeholder {
            color: var(--text-dim);
            opacity: 0.5;
        }

        /* 🚀 Action Buttons */
        .action-btn {
            width: 100%;
            background: #fff;
            color: #020617;
            border: none;
            border-radius: 18px;
            padding: 1.1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 20px 40px -10px rgba(255, 255, 255, 0.2);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--biz-c1), var(--biz-c2));
            color: #fff;
        }

        .action-btn.primary:hover {
            box-shadow: 0 20px 40px -10px var(--biz-c1);
        }

        /* 👥 Profile Selection Grid */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.25rem;
            width: 100%;
            margin-top: 0.5rem;
        }

        .profile-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.25rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 1.25rem;
            position: relative;
            overflow: hidden;
        }

        .card-loader {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                var(--biz-c1), 
                var(--biz-c2), 
                transparent);
            background-size: 200% 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .profile-item.is-loading .card-loader {
            opacity: 1;
            animation: loaderLoop 1.5s infinite linear;
        }

        @keyframes loaderLoop {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .profile-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--biz-c1);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.5);
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--biz-c1), var(--biz-c2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 8px 16px -4px var(--biz-c1);
        }

        .profile-info {
            flex: 1;
            min-width: 0; /* Ensures truncation works in flexbox */
        }

        .profile-info h4 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-info p {
            font-size: 0.75rem;
            color: var(--text-dim);
            opacity: 0.7;
        }

        .secondary-action {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.8rem;
            background: transparent;
            border: 1px dashed var(--glass-border);
            border-radius: 16px;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .secondary-action:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--text-dim);
            color: #fff;
        }

        /* 🔄 UI States & Animations */
        .hidden { display: none !important; }
        .fade-out { opacity: 0; pointer-events: none; }
        .fade-in { opacity: 1; pointer-events: auto; }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 🆘 Footer Status */
        .status-bar {
            position: fixed;
            bottom: 3rem;
            text-align: center;
            width: 100%;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0.6;
            transition: opacity 0.5s ease;
        }

        .status-bar.active {
            opacity: 1;
        }

        /* ⬅️ Navigation */
        .nav-back {
            position: absolute;
            top: 2rem;
            left: 2rem;
            padding: 0.8rem 1.2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .nav-back:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(-5px);
        }

        /* 🍞 Toast System */
        .toast-container {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toast {
            min-width: 320px;
            padding: 1.25rem 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-left: 5px solid var(--biz-c1);
            border-radius: 1.25rem;
            color: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: toastIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes toastIn { from { transform: translateX(100%) scale(0.9); opacity: 0; } }

        @media (max-width: 540px) {
            .main-stage { padding: 1rem; }
            .auth-card { padding: 2rem 1.5rem; }
            .toast-container { inset: 1rem 1rem auto 1rem; }
            .toast { min-width: 100%; }
        }
    </style>
</head>

<body>

    <div class="background-portal">
        <div id="bgLayer1"></div>
        <div id="bgLayer2"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <button id="navBack" class="nav-back hidden">
        <span>&larr;</span> Back to Profiles
    </button>

    <main class="main-stage">
        
        <div class="branding" id="branding">
            <img src="./Assets/img/Creatives_Logo-removebg-preview.png" class="primary-logo" id="mainLogo" alt="Creatives">
            <img src="" class="business-logo" id="bizLogo" alt="Business">
        </div>

        <div class="auth-card" id="authCard">
            
            <!-- Step 1: Business Identification -->
            <div id="stepBusiness" class="auth-step">
                <h2 class="step-title">Connect to Store</h2>
                <div class="input-group">
                    <input type="text" id="bizIdInput" class="modern-input" placeholder="Business ID (e.g. store123)" autocomplete="off">
                </div>
                <button id="btnVerifyBiz" class="action-btn primary">
                    <span id="btnTextVerify">Continue</span>
                    <div id="spinVerify" class="loading-spinner hidden"></div>
                </button>
            </div>

            <!-- Step 2: Profile Selection -->
            <div id="stepProfiles" class="auth-step hidden">
                <h2 class="step-title">Select Account</h2>
                <div class="profile-grid" id="profileGrid">
                    <!-- Dynamic profiles here -->
                </div>
            </div>

            <!-- Step 3: User Authentication -->
            <div id="stepLogin" class="auth-step hidden">
                <h2 class="step-title" id="selectedProfileName">Welcome Back</h2>
                <div class="input-group">
                    <input type="text" id="userInput" class="modern-input" placeholder="Username" autocomplete="username">
                </div>
                <div class="input-group">
                    <input type="password" id="passInput" class="modern-input" placeholder="Enter Password" autocomplete="current-password">
                </div>
                <button id="btnLogin" class="action-btn primary">
                    <span id="btnTextLogin">Unlock Station</span>
                    <div id="spinLogin" class="loading-spinner hidden"></div>
                </button>
            </div>

        </div>

        <div class="status-bar" id="statusBar">
            Securing Connection...
        </div>

    </main>

    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="Assets/js/theme.js"></script>
    <script src="Assets/js/firebase.js"></script>

    <script>
        // --- Core UI State Manager ---
        const UI = {
            branding: document.getElementById('branding'),
            logo: document.getElementById('bizLogo'),
            status: document.getElementById('statusBar'),
            cards: {
                business: document.getElementById('stepBusiness'),
                profiles: document.getElementById('stepProfiles'),
                login: document.getElementById('stepLogin')
            },
            inputs: {
                bizId: document.getElementById('bizIdInput'),
                user: document.getElementById('userInput'),
                pass: document.getElementById('passInput')
            },
            buttons: {
                verify: document.getElementById('btnVerifyBiz'),
                login: document.getElementById('btnLogin'),
                back: document.getElementById('navBack')
            },
            grid: document.getElementById('profileGrid')
        };

        let currentBusiness = null;
        let selectedProfile = null;

        // --- Initialization ---
        window.firebaseReady.then(() => {
            updateStatus("System Live. Ready to pair.");
            UI.status.classList.add('active');
            
            // Check for existing linkage
            const stored = localStorage.getItem("PROFILES");
            if (stored) {
                try {
                    const profiles = JSON.parse(stored);
                    if (profiles.length > 0) renderProfileList(profiles);
                    else showStep('business');
                } catch(e) { showStep('business'); }
            } else {
                showStep('business');
            }
        });

        // --- Interaction Logic ---

        UI.buttons.verify.onclick = async () => {
            const bizId = UI.inputs.bizId.value.trim();
            if(!bizId) return notify("Enter a valid Business ID", "error");

            toggleLoading(UI.buttons.verify, 'spinVerify', true);
            updateStatus("Locating business node...");

            try {
                const res = await verifyBusiness(bizId);
                if(!res.ok) throw new Error("Business not found");

                notify("Establishment verified!", "success");
                
                const profile = {
                    businessID: res.data.businessID,
                    businessName: res.data.businessName,
                    Username: bizId
                };

                saveProfile(profile);
                
                // Advance UI - Keep it neutral until a profile is selected
                setTimeout(() => {
                    renderProfileList([profile]);
                }, 400);

            } catch(e) {
                notify(e.message, "error");
                toggleLoading(UI.buttons.verify, 'spinVerify', false);
            }
        };

        UI.buttons.login.onclick = async () => {
            const u = UI.inputs.user.value.trim();
            const p = UI.inputs.pass.value;

            if(!u || !p) return notify("Credentials required", "error");

            toggleLoading(UI.buttons.login, 'spinLogin', true);
            updateStatus("Synchronizing security keys...");

            try {
                const res = await checkUserLogin(currentBusiness.businessID, u, p);
                if(res.status !== "OK") throw new Error(res.status === "WRONG_PASSWORD" ? "Invalid password" : "User unknown");

                updateStatus("Downloading permissions profile...");
                const perms = await getUserPermissions(currentBusiness.businessID, u);
                
                if(!perms || !perms.data) throw new Error("Security clearance failed");

                notify("Access Granted. Welcome, " + res.user.fName, "success");
                
                // Finalize Local state
                const sessionData = {
                    username: res.user.username,
                    fName: res.user.fName,
                    lName: res.user.lName,
                    role: perms.user?.role || "user",
                    permissions: perms.data
                };

                localStorage.setItem("CURRENT_USER", JSON.stringify(sessionData));
                localStorage.setItem("BUSINESS_INFO", JSON.stringify(currentBusiness));

                sendMessageToApp({ type: "#LOGIN_SUCCESS", data: sessionData });

                setTimeout(() => window.location.href = "dashboard.html", 800);

            } catch(e) {
                notify(e.message, "error");
                UI.cards.login.classList.add('shake');
                setTimeout(() => UI.cards.login.classList.remove('shake'), 400);
                toggleLoading(UI.buttons.login, 'spinLogin', false);
            }
        };

        UI.buttons.back.onclick = () => {
            showStep('profiles');
            resetToDefaultTheme(); // Restore Creatives theme when leaving business-specific login
            UI.buttons.back.classList.add('hidden');
        };

        function resetToDefaultTheme() {
            const next = document.getElementById('bgLayer2');
            const current = document.getElementById('bgLayer1');
            const defaultBg = `radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.15), transparent 40%),
                               radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15), transparent 40%),
                               var(--bg-deep)`;
            
            UI.branding.classList.remove('customized');
            document.body.style.color = 'var(--text-main)';
            
            next.style.background = defaultBg;
            next.style.opacity = '1';
            current.style.opacity = '0';

            setTimeout(() => {
                current.style.background = defaultBg;
                current.style.opacity = '1';
                next.style.opacity = '0';
            }, 1000);
        }

        // --- Helper Systems ---

        function showStep(stepName) {
            Object.keys(UI.cards).forEach(k => UI.cards[k].classList.add('hidden'));
            UI.cards[stepName].classList.remove('hidden');
            
            // Auto-focus
            if(stepName === 'business') UI.inputs.bizId.focus();
            if(stepName === 'login') UI.inputs.pass.focus();
        }

        function applyBusinessContext(data) {
            currentBusiness = data;
            const trademark = data.trademark;
            
            if(trademark) {
                document.documentElement.style.setProperty('--biz-c1', trademark.colour1 || '#6366f1');
                const generatedColor = window.generateGradientSecondary ? window.generateGradientSecondary(trademark.colour1 || '#6366f1', trademark.mode) : (trademark.colour1 || '#6366f1');
                document.documentElement.style.setProperty('--biz-c2', trademark.colour2 || generatedColor);

                if(trademark.logoLink) {
                    UI.logo.src = trademark.logoLink;
                    UI.branding.classList.add('customized');
                }

                applyThemeMode(trademark.mode, trademark.colour1, trademark.colour2);
            }
        }

        function applyThemeMode(mode, c1, c2) {
            const next = document.getElementById('bgLayer2');
            const current = document.getElementById('bgLayer1');
            
            let bg;
            if(mode === 'light') {
                bg = `linear-gradient(135deg, #f8fafc, #f1f5f9, #e2e8f0)`;
                document.body.style.color = '#020617';
            } else {
                bg = `radial-gradient(circle at top right, ${c1 || '#1e1b4b'}, #020617)`;
                document.body.style.color = '#fff';
            }

            next.style.background = bg;
            next.style.opacity = '1';
            current.style.opacity = '0';

            setTimeout(() => {
                current.style.background = bg;
                current.style.opacity = '1';
                next.style.opacity = '0';
            }, 1000);
        }

        function renderProfileList(profiles) {
            UI.grid.innerHTML = "";
            profiles.forEach(p => {
                const item = document.createElement('div');
                item.className = 'profile-item';
                item.innerHTML = `
                    <div class="profile-avatar">${p.businessName.charAt(0)}</div>
                    <div class="profile-info">
                        <h4>${p.businessName}</h4>
                        <p>${p.Username}</p>
                    </div>
                    <div class="card-loader"></div>
                `;
                item.onclick = async () => {
                    item.classList.add('is-loading');
                    updateStatus("Authenticating node...");
                    try {
                        const res = await verifyBusiness(p.Username || p.businessID);
                        if(res.ok) handleProfileSelection(p, res.data, item);
                        else {
                            item.classList.remove('is-loading');
                            notify("Link failed", "error");
                        }
                    } catch (e) {
                        item.classList.remove('is-loading');
                        notify("Connection lost", "error");
                    }
                };
                UI.grid.appendChild(item);
            });

            // "Add New Store" button - remove existing first to avoid dupes
            const existingAddBtn = UI.grid.parentElement.querySelector('.secondary-action');
            if(existingAddBtn) existingAddBtn.remove();

            const addBtn = document.createElement('button');
            addBtn.className = 'secondary-action';
            addBtn.innerHTML = `<span>+</span> Add New Store`;
            addBtn.onclick = () => {
                showStep('business');
                resetToDefaultTheme();
                UI.buttons.back.classList.add('hidden');
            };
            UI.grid.parentElement.appendChild(addBtn);
            
            UI.buttons.back.classList.add('hidden');
            showStep('profiles');
        }

        function handleProfileSelection(profile, businessData, cardElement) {
            if(cardElement) cardElement.classList.remove('is-loading');
            
            applyBusinessContext(businessData);
            document.getElementById('selectedProfileName').innerText = businessData.businessName;
            showStep('login');
            UI.buttons.back.innerHTML = `<span>&larr;</span> Back to Profiles`;
            UI.buttons.back.classList.remove('hidden');
        }

        function saveProfile(p) {
            let profiles = [];
            try { profiles = JSON.parse(localStorage.getItem("PROFILES") || "[]"); } catch(e){}
            if(!profiles.find(x => x.businessID === p.businessID)) {
                profiles.push(p);
                localStorage.setItem("PROFILES", JSON.stringify(profiles));
            }
        }

        function toggleLoading(btn, spinnerId, isLoading) {
            btn.disabled = isLoading;
            document.getElementById(spinnerId).classList.toggle('hidden', !isLoading);
            const btnText = btn.querySelector('span');
            if(btnText) btnText.style.display = isLoading ? 'none' : 'block';
        }

        function notify(msg, type) {
            const cont = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<span>${type === 'success' ? '✔' : '✖'}</span> <span>${msg}</span>`;
            cont.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        function updateStatus(msg) {
            UI.status.innerText = msg;
        }

        function sendMessageToApp(data) {
            if (window.ReactNativeWebView) ReactNativeWebView.postMessage(JSON.stringify(data));
            else if (window.Android) Android.postMessage(JSON.stringify(data));
            else if (window.chrome?.webview) chrome.webview.postMessage(data);
        }

        // Enter key listeners
        UI.inputs.bizId.onkeypress = (e) => { if (e.key === 'Enter') UI.buttons.verify.click(); };
        UI.inputs.pass.onkeypress = (e) => { if (e.key === 'Enter') UI.buttons.login.click(); };

    </script>
</body>

</html>
