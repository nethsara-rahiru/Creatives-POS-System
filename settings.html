<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Settings Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Assets/css/style.css">
<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-color);
    display: flex;
    color: var(--text-primary);
}

.sidebar {
    width: 280px;
    background: var(--panel-bg);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 2rem 1.5rem;
    position: sticky;
    top: 0;
    height: 100vh;
}

.sidebar h2 {
    margin-bottom: 2.5rem;
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sidebar button {
    background: none;
    border: none;
    padding: 1rem 1.25rem;
    text-align: left;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: all var(--transition-fast);
    color: var(--text-secondary);
    border-radius: var(--radius-md);
}

.sidebar button:hover, .sidebar button.active {
    background: rgba(99, 102, 241, 0.1);
    color: var(--brand-primary);
}

.main {
    flex: 1;
    padding: 2.5rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2rem;
    max-width: 900px;
}

.panel {
    display: none;
    background: var(--panel-bg);
    border-radius: var(--radius-lg);
    padding: 2rem;
    border: 1px solid var(--border-color);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    animation: fadeIn var(--transition-normal);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.panel.active {
    display: block;
}

.panel h3 {
    margin-bottom: 1.5rem;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary);
}

label {
    font-weight: 600;
    margin-bottom: 0.5rem;
    display: block;
    font-size: 0.875rem;
    color: var(--text-secondary);
}

input[type="text"], input[type="color"] {
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
    background: var(--bg-color);
    color: var(--text-primary);
    margin-bottom: 1.5rem;
    outline: none;
    transition: border-color var(--transition-fast);
}

input[type="text"]:focus {
    border-color: var(--brand-primary);
}

button#saveBtn {
    margin-top: 1rem;
    padding: 1rem 2rem;
    font-size: 1.125rem;
    font-weight: 700;
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
    cursor: pointer;
    transition: all var(--transition-normal);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    align-self: flex-start;
}

@media (max-width: 768px) {
    body {
        flex-direction: column;
    }
    .sidebar {
        width: 100%;
        height: auto;
        position: sticky;
        top: 0;
        z-index: 1000;
        padding: 1rem;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        flex-direction: row;
        gap: 0.5rem;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: nowrap;
    }
    .sidebar h2 { display: none; }
    .sidebar button {
        width: auto;
        padding: 0.6rem 1rem;
        font-size: 0.875rem;
        flex-shrink: 0;
    }
    .main {
        padding: 1.25rem;
        width: 100%;
    }
    .panel {
        padding: 1.25rem;
    }
    button#saveBtn {
        width: 100%;
        margin-top: 0.5rem;
    }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Settings</h2>
    <button class="tabBtn active" data-tab="cashierPanel">Cashier Info</button>
    <button class="tabBtn" data-tab="shopPanel">Shop Details</button>
    <button class="tabBtn" data-tab="themePanel">Theme Colors</button>
    <button class="tabBtn" data-tab="otherPanel">Other</button>
</div>

<!-- Main content -->
<div class="main">
    <div class="panel active" id="cashierPanel">
        <h3>Cashier Info</h3>
        <label for="username">Username / Cashier Name</label>
        <input type="text" id="username" placeholder="Enter your name">
    </div>

    <div class="panel" id="shopPanel">
        <h3>Shop Details</h3>
        <label for="shopName">Shop Name</label>
        <input type="text" id="shopName" placeholder="Enter shop name">

        <label for="logo">Logo URL</label>
        <input type="text" id="logo" placeholder="Enter logo link">
    </div>

    <div class="panel" id="themePanel">
        <h3>Theme Colors</h3>
        <label for="theme1">Theme Color 1</label>
        <input type="color" id="theme1" value="#519cff">

        <label for="theme2">Theme Color 2 <span class="optional">(optional)</span></label>
        <input type="color" id="theme2">
    </div>

    <div class="panel" id="otherPanel">
        <h3>Other Settings</h3>
        <p>Additional options can go here.</p>
    </div>

    <button id="saveBtn">Save Settings</button>
</div>

<script>
// Tab switching
const tabButtons = document.querySelectorAll(".tabBtn");
const panels = document.querySelectorAll(".panel");

tabButtons.forEach(btn => {
    btn.addEventListener("click", () => {
        tabButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        panels.forEach(p => p.classList.remove("active"));
        document.getElementById(btn.dataset.tab).classList.add("active");
    });
});

// Save button
document.getElementById("saveBtn").addEventListener("click", function() {
    const username = document.getElementById("username").value.trim();
    const shopName = document.getElementById("shopName").value.trim();
    const logo = document.getElementById("logo").value.trim();
    const theme1 = document.getElementById("theme1").value;
    const theme2 = document.getElementById("theme2").value || null;

    if(!username || !shopName){
        alert("Username and Shop Name are required!");
        return;
    }

    console.log({username, shopName, logo, theme1, theme2});
    alert("Settings saved successfully!");
    // TODO: send data to SQLite via C# backend
});
</script>

</body>
</html>
